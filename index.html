<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kw-Translator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f8f6;
  --surface: #ffffff;
  --border: #e8e8e4;
  --border-strong: #ccc;
  --text: #1a1a1a;
  --text-sub: #888;
  --text-muted: #bbb;
  --accent: #1a1a1a;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #ca8a04;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; }

.app { max-width: 860px; margin: 0 auto; padding: 20px 16px 80px; }
header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.logo { font-size: 17px; font-weight: 600; letter-spacing: .5px; }
.logo-sub { font-size: 11px; color: var(--text-sub); margin-left: 6px; font-weight: 400; }
.status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-sub); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-strong); flex-shrink: 0; transition: background .3s; }
.dot.live { background: var(--green); }
.dot.warn { background: var(--yellow); }

.screen { display: none; }
.screen.active { display: block; }

/* ─── Setup ─── */
.setup-wrap { max-width: 440px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; box-shadow: var(--shadow); }
.setup-wrap h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.setup-desc { font-size: 13px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.6; }

.field { margin-bottom: 14px; }
label { font-size: 12px; color: var(--text-sub); display: block; margin-bottom: 5px; font-weight: 500; }
input[type=text], select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--surface); outline: none; transition: border-color .15s; -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--accent); }

/* 言語セレクト — 検索ボックス付きカスタム */
.lang-select-wrap { position: relative; }
.lang-select-wrap select { padding-right: 32px; }

/* 名前 + 言語 横並び */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
@media (max-width: 400px) { .field-row { grid-template-columns: 1fr; } }

/* 母語ヒント */
.lang-hint {
  font-size: 11px; color: var(--text-muted); margin-top: 5px; line-height: 1.5;
}

.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 18px; border-radius: 8px; border: 1px solid transparent; font-family: inherit; font-size: 14px; cursor: pointer; transition: all .12s; white-space: nowrap; }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover:not(:disabled) { background: #333; }
.btn-outline { background: var(--surface); color: var(--text); border-color: var(--border); }
.btn-outline:hover:not(:disabled) { border-color: var(--border-strong); }
.btn-danger { background: #fff1f1; color: var(--red); border-color: #fecaca; }
.btn-danger:hover:not(:disabled) { background: #fee2e2; }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn-full { width: 100%; }

.divider { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 12px; margin: 18px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.join-row { display: flex; gap: 8px; }
.join-row input { font-family: 'Roboto Mono', monospace; letter-spacing: 3px; text-transform: uppercase; font-size: 16px; text-align: center; }

/* ─── Room ─── */
.room-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
.room-id-block { display: flex; align-items: center; gap: 4px; }
.room-id { font-family: 'Roboto Mono', monospace; font-size: 20px; font-weight: 500; letter-spacing: 4px; }
.room-id-label { font-size: 11px; color: var(--text-sub); }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 3px 5px; border-radius: 4px; transition: all .12s; }
.icon-btn:hover { color: var(--text); background: var(--border); }
.conn-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid transparent; }
.conn-badge.connected    { background: #f0fdf4; color: var(--green); border-color: #bbf7d0; }
.conn-badge.connecting   { background: #fefce8; color: var(--yellow); border-color: #fde68a; }
.conn-badge.disconnected { background: #fafafa; color: var(--text-sub); border-color: var(--border); }
.room-actions { margin-left: auto; display: flex; gap: 8px; }

.room-layout { display: grid; grid-template-columns: 1fr 210px; gap: 12px; }
@media (max-width: 620px) { .room-layout { grid-template-columns: 1fr; } }

.transcript-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; height: 400px; box-shadow: var(--shadow); }
.transcript-head { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text-sub); background: var(--bg); }
.transcript-feed { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.transcript-feed::-webkit-scrollbar { width: 3px; }
.transcript-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.empty-hint { text-align: center; color: var(--text-muted); font-size: 13px; margin: auto; padding: 40px 0; }
.msg { padding: 10px 12px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); animation: fadein .2s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
.msg-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.msg-name { font-size: 12px; font-weight: 600; }
.msg-lang { font-size: 10px; color: var(--text-sub); background: var(--border); padding: 1px 6px; border-radius: 3px; }
.msg-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }
.msg-original { font-size: 12px; color: var(--text-muted); margin-bottom: 3px; font-style: italic; }
.msg-translated { font-size: 14px; line-height: 1.55; }

.mic-section { margin-top: 10px; }
.mic-btn { width: 100%; padding: 13px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); font-family: inherit; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .15s; box-shadow: var(--shadow); }
.mic-btn:hover { border-color: var(--border-strong); }
.mic-btn.recording { border-color: var(--red); color: var(--red); background: #fff8f8; box-shadow: 0 0 0 3px rgba(220,38,38,.08); }
.vol-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
.vol-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .1s; width: 0%; }
.interim { font-size: 12px; color: var(--text-muted); margin-top: 6px; min-height: 16px; line-height: 1.4; }
.tts-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; font-size: 13px; color: var(--text-sub); }
.toggle { width: 34px; height: 18px; background: var(--border-strong); border-radius: 9px; cursor: pointer; position: relative; transition: background .2s; flex-shrink: 0; }
.toggle.on { background: var(--green); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: #fff; transition: transform .2s; box-shadow: 0 1px 2px rgba(0,0,0,.2); }
.toggle.on::after { transform: translateX(16px); }

.sidebar { display: flex; flex-direction: column; gap: 12px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); }
.panel-title { font-size: 10px; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px; font-weight: 600; }
.participant { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--bg); }
.participant:last-child { border-bottom: none; }
.p-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.p-info .p-name { font-size: 13px; line-height: 1.2; }
.p-info .p-lang { font-size: 11px; color: var(--text-muted); }
.p-speaking { width: 7px; height: 7px; border-radius: 50%; background: var(--border); margin-left: auto; flex-shrink: 0; transition: background .2s; }
.p-speaking.active { background: var(--green); box-shadow: 0 0 0 3px rgba(22,163,74,.2); }

.qr-wrap { text-align: center; }
.qr-wrap img { display: block; margin: 0 auto; image-rendering: pixelated; border-radius: 4px; }
.qr-note { font-size: 11px; color: var(--text-muted); margin-top: 6px; }

.wake-banner { background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: var(--yellow); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.wake-banner.hidden { display: none; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 50; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius); padding: 24px; max-width: 320px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
.modal h2 { font-size: 16px; margin-bottom: 8px; }
.modal-qr { text-align: center; margin: 12px 0; }
.modal-room-id { font-family: 'Roboto Mono', monospace; font-size: 24px; letter-spacing: 6px; text-align: center; margin: 8px 0; }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal-actions .btn { flex: 1; }

.toast-wrap { position: fixed; bottom: 20px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 100; }
.toast { background: #1a1a1a; color: #fff; padding: 9px 14px; border-radius: 8px; font-size: 13px; max-width: 260px; animation: tin .2s ease; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
.toast.warn { background: #7c2d12; }
.toast.ok   { background: #14532d; }
@keyframes tin { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <span class="logo">Kw-Translator</span>
      <span class="logo-sub">同時翻訳</span>
    </div>
    <div class="status">
      <div class="dot" id="conn-dot"></div>
      <span id="conn-label">未接続</span>
    </div>
  </header>

  <!-- SETUP -->
  <div class="screen active" id="screen-setup">
    <div class="setup-wrap">
      <h1>国際会議に参加する</h1>
      <p class="setup-desc">
        母語を選んでルームを作成するか、ルームコードかQRコードで相手のルームに参加してください
      </p>

      <div class="field-row">
        <div class="field">
          <label>あなたの名前</label>
          <input type="text" id="input-name" placeholder="例：原田 一希" maxlength="20" autocomplete="nickname">
        </div>
        <div class="field">
          <label>母語（話す＆聞く言語）</label>
          <div class="lang-select-wrap">
            <select id="input-lang">
              <option value="ja">🇯🇵 日本語</option>
              <option value="en">🇺🇸 English</option>
              <option value="zh">🇨🇳 中文（简体）</option>
              <option value="zh-TW">🇹🇼 中文（繁體）</option>
              <option value="ko">🇰🇷 한국어</option>
              <option value="vi">🇻🇳 Tiếng Việt</option>
              <option value="th">🇹🇭 ภาษาไทย</option>
              <option value="id">🇮🇩 Bahasa Indonesia</option>
              <option value="ms">🇲🇾 Bahasa Melayu</option>
              <option value="tl">🇵🇭 Filipino</option>
              <option value="hi">🇮🇳 हिन्दी</option>
              <option value="bn">🇧🇩 বাংলা</option>
              <option value="ur">🇵🇰 اردو</option>
              <option value="ar">🇸🇦 العربية</option>
              <option value="fa">🇮🇷 فارسی</option>
              <option value="tr">🇹🇷 Türkçe</option>
              <option value="ru">🇷🇺 Русский</option>
              <option value="uk">🇺🇦 Українська</option>
              <option value="pl">🇵🇱 Polski</option>
              <option value="nl">🇳🇱 Nederlands</option>
              <option value="de">🇩🇪 Deutsch</option>
              <option value="fr">🇫🇷 Français</option>
              <option value="es">🇪🇸 Español</option>
              <option value="pt">🇧🇷 Português</option>
              <option value="it">🇮🇹 Italiano</option>
              <option value="ro">🇷🇴 Română</option>
              <option value="sv">🇸🇪 Svenska</option>
              <option value="no">🇳🇴 Norsk</option>
              <option value="da">🇩🇰 Dansk</option>
              <option value="fi">🇫🇮 Suomi</option>
            </select>
          </div>
          <div class="lang-hint">この言語で話し、この言語に翻訳して受け取ります</div>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="createRoom()">ルームを作成</button>

      <div class="divider">または</div>

      <div class="join-row">
        <input type="text" id="input-room-id" placeholder="XXXX" maxlength="8"
               oninput="this.value=this.value.replace(/[^A-Za-z0-9]/g,'').toUpperCase()">
        <button class="btn btn-outline" onclick="joinRoom()">参加</button>
      </div>
      <p style="font-size:11px;color:var(--text-muted);margin-top:8px">QRスキャンでIDが自動入力されます</p>
    </div>
  </div>

  <!-- ROOM -->
  <div class="screen" id="screen-room">
    <div class="wake-banner hidden" id="wake-banner">
      サーバーを起動中です。初回接続に数秒かかる場合があります...
    </div>

    <div class="room-header">
      <div class="room-id-block">
        <span class="room-id-label">ROOM</span>
        <span class="room-id" id="room-id-display">----</span>
        <button class="icon-btn" onclick="copyId()" title="IDをコピー">⎘</button>
      </div>
      <span class="conn-badge disconnected" id="conn-badge">● 接続中...</span>
      <div class="room-actions">
        <button class="btn btn-outline btn-sm" onclick="showQR()">QR</button>
        <button class="btn btn-danger btn-sm" onclick="leaveRoom()">退出</button>
      </div>
    </div>

    <div class="room-layout">
      <div>
        <div class="transcript-card">
          <div class="transcript-head">
            <span>発言ログ</span>
            <span id="msg-count">0 件</span>
          </div>
          <div class="transcript-feed" id="feed">
            <div class="empty-hint">マイクをオンにして話してください</div>
          </div>
        </div>
        <div class="mic-section">
          <button class="mic-btn" id="mic-btn" onclick="toggleMic()">
            <span id="mic-icon">🎙</span>
            <span id="mic-label">マイクをオンにする</span>
          </button>
          <div class="vol-bar"><div class="vol-fill" id="vol"></div></div>
          <div class="interim" id="interim"></div>
          <div class="tts-row">
            <span>翻訳を音声で読み上げ</span>
            <div class="toggle on" id="tts-room" onclick="toggleTTS()" role="switch" aria-checked="true" tabindex="0"></div>
          </div>
        </div>
      </div>

      <div class="sidebar">
        <div class="panel">
          <div class="panel-title">参加者</div>
          <div id="plist"></div>
        </div>
        <div class="panel">
          <div class="panel-title">招待 QR</div>
          <div class="qr-wrap" id="qr-side-wrap"></div>
          <div class="qr-note">スキャンで即参加</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- QR Modal -->
<div class="modal-bg" id="qr-modal" role="dialog" aria-modal="true">
  <div class="modal">
    <h2>QRコードで招待</h2>
    <p style="font-size:12px;color:var(--text-sub)">スキャンするとすぐに参加できます</p>
    <div class="modal-qr" id="qr-modal-wrap"></div>
    <div class="modal-room-id" id="qr-room-display"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeQR()">閉じる</button>
      <button class="btn btn-primary" onclick="copyLink()">リンクをコピー</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts" aria-live="polite"></div>

<script>
// ════════════════════════════════════════════════════════
//  設定
// ════════════════════════════════════════════════════════
const WS_URL = 'wss://translator-5t9v.onrender.com';

// 言語コード → Web Speech API の BCP47 タグ
// （音声認識に使う。同じ言語でも複数バリアントある場合は代表を選択）
const LANG_TO_BCP47 = {
  'ja':    'ja-JP',
  'en':    'en-US',
  'zh':    'zh-CN',
  'zh-TW': 'zh-TW',
  'ko':    'ko-KR',
  'vi':    'vi-VN',
  'th':    'th-TH',
  'id':    'id-ID',
  'ms':    'ms-MY',
  'tl':    'fil-PH',
  'hi':    'hi-IN',
  'bn':    'bn-BD',
  'ur':    'ur-PK',
  'ar':    'ar-SA',
  'fa':    'fa-IR',
  'tr':    'tr-TR',
  'ru':    'ru-RU',
  'uk':    'uk-UA',
  'pl':    'pl-PL',
  'nl':    'nl-NL',
  'de':    'de-DE',
  'fr':    'fr-FR',
  'es':    'es-ES',
  'pt':    'pt-BR',
  'it':    'it-IT',
  'ro':    'ro-RO',
  'sv':    'sv-SE',
  'no':    'nb-NO',
  'da':    'da-DK',
  'fi':    'fi-FI',
};

// ════════════════════════════════════════════════════════
//  State
// ════════════════════════════════════════════════════════
const S = {
  roomId: null, myId: null, myName: '',
  lang: 'ja',           // 母語コード（話す＆受け取る言語）
  ttsEnabled: true, recording: false, rec: null,
  ws: null, wsReady: false,
  reconnectTimer: null, reconnectCount: 0,
  participants: {}, participantOrder: [],
  msgCount: 0,
  lastSentText: '', lastSentTime: 0,
  feedInitialized: false,
};

const PAL = ['#4f46e5','#0891b2','#16a34a','#ca8a04','#dc2626','#9333ea','#0e7490','#b45309'];
const pCol  = i => PAL[i % PAL.length];
const randId = n => Math.random().toString(36).toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0, n).padEnd(n, 'A');
const uid    = () => Math.random().toString(36).slice(2, 12);

// ════════════════════════════════════════════════════════
//  Init
// ════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const p = new URLSearchParams(location.search).get('room');
  if (p) {
    const safe = p.replace(/[^A-Za-z0-9]/g, '').toUpperCase().slice(0, 8);
    if (safe) {
      document.getElementById('input-room-id').value = safe;
      toast('ルーム ' + safe + ' のリンクを検出しました');
    }
  }
  document.getElementById('qr-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeQR();
  });
  window.addEventListener('beforeunload', () => {
    wsSend({ type: 'leave' });
    stopRec();
    S.ws?.close();
  });
});

// ════════════════════════════════════════════════════════
//  UI helpers
// ════════════════════════════════════════════════════════
function toast(msg, type = '', duration = 3000) {
  const c = document.getElementById('toasts');
  const t = document.createElement('div');
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setConnUI(state) {
  const dot   = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  const badge = document.getElementById('conn-badge');
  if (state === 'connected') {
    dot.className = 'dot live'; label.textContent = '接続中';
    badge.className = 'conn-badge connected'; badge.textContent = '● 接続済み';
  } else if (state === 'connecting') {
    dot.className = 'dot warn'; label.textContent = '接続中...';
    badge.className = 'conn-badge connecting'; badge.textContent = '◌ 接続中...';
  } else {
    dot.className = 'dot'; label.textContent = '未接続';
    badge.className = 'conn-badge disconnected'; badge.textContent = '○ 未接続';
  }
}

function toggleTTS() {
  S.ttsEnabled = !S.ttsEnabled;
  const el = document.getElementById('tts-room');
  el.classList.toggle('on', S.ttsEnabled);
  el.setAttribute('aria-checked', S.ttsEnabled);
}

// ════════════════════════════════════════════════════════
//  Setup → Room
// ════════════════════════════════════════════════════════
function readSetup() {
  return {
    name: document.getElementById('input-name').value.trim() || '匿名',
    lang: document.getElementById('input-lang').value,
  };
}

function createRoom() {
  const { name, lang } = readSetup();
  resetState();
  Object.assign(S, { roomId: randId(4), myId: uid(), myName: name, lang });
  enterRoom();
}

function joinRoom() {
  const rid = document.getElementById('input-room-id').value
    .replace(/[^A-Za-z0-9]/g, '').toUpperCase();
  if (rid.length < 2) { toast('ルームIDを入力してください'); return; }
  const { name, lang } = readSetup();
  resetState();
  Object.assign(S, { roomId: rid, myId: uid(), myName: name, lang });
  enterRoom();
}

function resetState() {
  stopRec();
  if (S.ws) { S.ws.onclose = null; S.ws.close(); S.ws = null; }
  clearTimeout(S.reconnectTimer);
  S.participants = {}; S.participantOrder = [];
  S.msgCount = 0; S.lastSentText = ''; S.lastSentTime = 0;
  S.wsReady = false; S.reconnectCount = 0; S.feedInitialized = false;
}

function enterRoom() {
  show('screen-room');
  document.getElementById('room-id-display').textContent = S.roomId;
  document.getElementById('feed').innerHTML = '<div class="empty-hint">マイクをオンにして話してください</div>';
  document.getElementById('msg-count').textContent = '0 件';
  document.getElementById('plist').innerHTML = '';

  S.participants[S.myId] = { name: S.myName, lang: S.lang, speaking: false, isMe: true };
  S.participantOrder.push(S.myId);
  renderParticipants();

  const url = location.href.split('?')[0] + '?room=' + S.roomId;
  renderQR('qr-side-wrap', url, 160);

  setConnUI('connecting');
  connectWS();
}

// ════════════════════════════════════════════════════════
//  WebSocket
// ════════════════════════════════════════════════════════
const WS_RECONNECT_DELAYS = [1000, 2000, 4000, 8000, 15000];
let wakeBannerTimer = null;
let pingTimer = null;

function startPing() {
  stopPing();
  pingTimer = setInterval(() => {
    if (S.ws && S.ws.readyState === WebSocket.OPEN) {
      S.ws.send(JSON.stringify({ type: 'ping' }));
    }
  }, 25000);
}
function stopPing() { clearInterval(pingTimer); pingTimer = null; }

function connectWS() {
  clearTimeout(wakeBannerTimer);
  wakeBannerTimer = setTimeout(() => {
    if (!S.wsReady) document.getElementById('wake-banner').classList.remove('hidden');
  }, 3000);

  try { S.ws = new WebSocket(WS_URL); }
  catch (e) { toast('WebSocket接続エラー: ' + e.message, 'warn'); return; }

  S.ws.onopen = () => {
    S.wsReady = true; S.reconnectCount = 0;
    clearTimeout(wakeBannerTimer);
    document.getElementById('wake-banner').classList.add('hidden');
    setConnUI('connected');
    startPing();
    // 母語1つだけ送信
    wsSend({
      type:     'join',
      roomId:   S.roomId,
      clientId: S.myId,
      name:     S.myName,
      lang:     S.lang,   // 'ja', 'en', 'zh-TW' など
    });
  };

  S.ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'pong') return;
      onServerMsg(msg);
    } catch (e) { console.error('WS parse error:', e); }
  };

  S.ws.onclose = () => {
    S.wsReady = false; stopPing();
    if (!S.roomId) return;
    setConnUI('connecting');
    const delay = WS_RECONNECT_DELAYS[Math.min(S.reconnectCount, WS_RECONNECT_DELAYS.length - 1)];
    S.reconnectCount++;
    toast(`切断されました。${delay / 1000}秒後に再接続...`, 'warn');
    S.reconnectTimer = setTimeout(connectWS, delay);
  };

  S.ws.onerror = () => {};
}

function wsSend(data) {
  if (S.ws && S.ws.readyState === WebSocket.OPEN) S.ws.send(JSON.stringify(data));
}

// ════════════════════════════════════════════════════════
//  Server messages
// ════════════════════════════════════════════════════════
function onServerMsg(d) {
  if (!d || !d.type) return;
  switch (d.type) {

    case 'room_state':
      (d.participants || []).forEach(p => {
        if (!S.participants[p.id]) {
          S.participants[p.id] = { name: p.name, lang: p.lang, speaking: false };
          S.participantOrder.push(p.id);
        }
      });
      renderParticipants();
      break;

    case 'join':
      if (!S.participants[d.clientId]) {
        S.participants[d.clientId] = { name: d.name, lang: d.lang, speaking: false };
        S.participantOrder.push(d.clientId);
        renderParticipants();
      }
      toast(d.name + ' が参加しました', 'ok');
      break;

    case 'leave': {
      const p = S.participants[d.clientId];
      if (p) {
        toast(p.name + ' が退出しました');
        delete S.participants[d.clientId];
        S.participantOrder = S.participantOrder.filter(id => id !== d.clientId);
        renderParticipants();
      }
      break;
    }

    case 'speech':
      addMsg({
        id:         d.clientId,
        name:       d.name,
        lang:       d.lang,
        original:   d.original,
        translated: d.translated,
        isMe:       false,
      });
      if (S.ttsEnabled && d.translated?.trim()) {
        // 自分の母語のBCP47タグでTTS
        speak(d.translated, LANG_TO_BCP47[S.lang] || S.lang);
      }
      break;

    case 'speaking':
      if (S.participants[d.clientId]) {
        S.participants[d.clientId].speaking = !!d.active;
        renderParticipants();
      }
      break;
  }
}

// ════════════════════════════════════════════════════════
//  Participants
// ════════════════════════════════════════════════════════
function renderParticipants() {
  const el = document.getElementById('plist');
  el.innerHTML = '';
  S.participantOrder.forEach((id, i) => {
    const p = S.participants[id];
    if (!p) return;
    const col  = pCol(i);
    const wrap = document.createElement('div');
    wrap.className = 'participant';

    const av = document.createElement('div');
    av.className = 'p-avatar';
    av.style.cssText = `background:${col}20;color:${col}`;
    av.textContent = [...(p.name || '?')][0] || '?';

    const info = document.createElement('div');
    info.className = 'p-info';
    const nm = document.createElement('div'); nm.className = 'p-name';
    nm.textContent = p.name + (p.isMe ? ' (自分)' : '');
    const lg = document.createElement('div'); lg.className = 'p-lang';
    lg.textContent = p.lang;
    info.appendChild(nm); info.appendChild(lg);

    const spk = document.createElement('div');
    spk.className = 'p-speaking' + (p.speaking ? ' active' : '');

    wrap.appendChild(av); wrap.appendChild(info); wrap.appendChild(spk);
    el.appendChild(wrap);
  });
}

// ════════════════════════════════════════════════════════
//  QR
// ════════════════════════════════════════════════════════
function renderQR(wrapId, text, sizePx) {
  const wrap = document.getElementById(wrapId);
  if (!wrap) return;
  wrap.innerHTML = '';
  new QRCode(wrap, { text, width: sizePx, height: sizePx, colorDark: '#1a1a1a', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
  const child = wrap.firstChild;
  if (child) child.style.cssText = 'display:block;margin:0 auto;border-radius:4px';
}

function showQR() {
  const url = location.href.split('?')[0] + '?room=' + S.roomId;
  renderQR('qr-modal-wrap', url, 200);
  document.getElementById('qr-room-display').textContent = S.roomId;
  document.getElementById('qr-modal').classList.add('open');
}
function closeQR()  { document.getElementById('qr-modal').classList.remove('open'); }
function copyId()   { navigator.clipboard.writeText(S.roomId).then(() => toast('ルームIDをコピーしました')); }
function copyLink() {
  const url = location.href.split('?')[0] + '?room=' + S.roomId;
  navigator.clipboard.writeText(url).then(() => { toast('リンクをコピーしました'); closeQR(); });
}

// ════════════════════════════════════════════════════════
//  Mic / Speech Recognition
// ════════════════════════════════════════════════════════
let ttsPrimed = false;
function primeTTS() {
  if (ttsPrimed) return;
  ttsPrimed = true;
  const u = new SpeechSynthesisUtterance(''); u.volume = 0;
  speechSynthesis.speak(u);
}

function toggleMic() { S.recording ? stopRec() : startRec(); }

function startRec() {
  if (!S.wsReady) { toast('まだ接続中です。しばらくお待ちください', 'warn'); return; }
  primeTTS();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('このブラウザは音声認識非対応（Chrome推奨）', 'warn'); return; }
  if (S.rec) { try { S.rec.abort(); } catch {} S.rec = null; }

  const r = new SR();
  // 母語のBCP47タグで音声認識
  r.lang = LANG_TO_BCP47[S.lang] || S.lang;
  r.continuous = true; r.interimResults = true;
  let stopped = false;

  r.onstart = () => {
    S.recording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-icon').textContent = '🔴';
    document.getElementById('mic-label').textContent = '認識中... (タップで停止)';
    wsSend({ type: 'speaking', active: true });
    if (S.participants[S.myId]) S.participants[S.myId].speaking = true;
    renderParticipants();
  };

  r.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    document.getElementById('interim').textContent = interim;
    animVol();
    if (final.trim()) {
      document.getElementById('interim').textContent = '';
      sendSpeech(final.trim());
    }
  };

  r.onerror = e => {
    if (e.error === 'aborted') return;
    toast('音声認識エラー: ' + e.error, 'warn');
    stopped = true; stopRec();
  };

  r.onend = () => {
    if (!stopped && S.recording && S.rec === r) {
      try { r.start(); } catch { stopRec(); }
    }
  };

  r.start();
  S.rec = r;
  S.rec._stop = () => { stopped = true; };
}

function stopRec() {
  S.recording = false;
  if (S.rec) { S.rec._stop?.(); try { S.rec.abort(); } catch {} S.rec = null; }
  document.getElementById('mic-btn')?.classList.remove('recording');
  const iconEl  = document.getElementById('mic-icon');
  const labelEl = document.getElementById('mic-label');
  if (iconEl)  iconEl.textContent  = '🎤';
  if (labelEl) labelEl.textContent = 'マイクをオンにする';
  const interimEl = document.getElementById('interim');
  if (interimEl) interimEl.textContent = '';
  const volEl = document.getElementById('vol');
  if (volEl) volEl.style.width = '0%';
  wsSend({ type: 'speaking', active: false });
  if (S.participants[S.myId]) S.participants[S.myId].speaking = false;
  renderParticipants();
}

let volTimer = null;
function animVol() {
  clearTimeout(volTimer);
  document.getElementById('vol').style.width = (30 + Math.random() * 60) + '%';
  volTimer = setTimeout(() => {
    const el = document.getElementById('vol');
    if (el) el.style.width = '5%';
  }, 300);
}

// ════════════════════════════════════════════════════════
//  Send speech
// ════════════════════════════════════════════════════════
function sendSpeech(text) {
  const now = Date.now();
  if (text === S.lastSentText && now - S.lastSentTime < 1200) return;
  S.lastSentText = text; S.lastSentTime = now;

  // 自分の発言は原文のままログ表示
  addMsg({ id: S.myId, name: S.myName, lang: S.lang, original: text, translated: text, isMe: true });

  // サーバーへ送信（各受信者の母語に翻訳して配信）
  wsSend({ type: 'speech', text });
}

// ════════════════════════════════════════════════════════
//  TTS
// ════════════════════════════════════════════════════════
function speak(text, lang) {
  speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang; u.rate = 1.0; u.volume = 1.0;
    speechSynthesis.speak(u);
    const keepAlive = setInterval(() => {
      if (!speechSynthesis.speaking) { clearInterval(keepAlive); return; }
      speechSynthesis.pause(); speechSynthesis.resume();
    }, 10000);
    u.onend  = () => clearInterval(keepAlive);
    u.onerror = () => clearInterval(keepAlive);
  }, 300);
}

// ════════════════════════════════════════════════════════
//  Transcript
// ════════════════════════════════════════════════════════
function addMsg({ id, name, lang, original, translated, isMe }) {
  const feed = document.getElementById('feed');
  if (!S.feedInitialized) {
    feed.querySelector('.empty-hint')?.remove();
    S.feedInitialized = true;
  }
  S.msgCount++;
  document.getElementById('msg-count').textContent = S.msgCount + ' 件';

  const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  const idx  = S.participantOrder.indexOf(id);
  const col  = pCol(idx >= 0 ? idx : 0);

  const card = document.createElement('div');
  card.className = 'msg';

  const meta = document.createElement('div'); meta.className = 'msg-meta';
  const nm = document.createElement('span'); nm.className = 'msg-name'; nm.style.color = col; nm.textContent = name;
  const lg = document.createElement('span'); lg.className = 'msg-lang'; lg.textContent = lang;
  const tm = document.createElement('span'); tm.className = 'msg-time'; tm.textContent = now;
  meta.appendChild(nm); meta.appendChild(lg); meta.appendChild(tm);
  card.appendChild(meta);

  // 原文と翻訳が異なる場合のみ原文を表示
  if (!isMe && original !== translated) {
    const orig = document.createElement('div');
    orig.className = 'msg-original';
    orig.textContent = original;
    card.appendChild(orig);
  }

  const tr = document.createElement('div'); tr.className = 'msg-translated';
  tr.textContent = translated;
  card.appendChild(tr);

  feed.appendChild(card);
  feed.scrollTop = feed.scrollHeight;
}

// ════════════════════════════════════════════════════════
//  Leave
// ════════════════════════════════════════════════════════
async function leaveRoom() {
  stopRec(); stopPing();
  wsSend({ type: 'leave' });
  await new Promise(r => setTimeout(r, 100));
  S.roomId = null;
  if (S.ws) { S.ws.onclose = null; S.ws.close(); S.ws = null; }
  clearTimeout(S.reconnectTimer);
  clearTimeout(wakeBannerTimer);
  setConnUI('disconnected');
  show('screen-setup');
}
</script>
